<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>365 Intentional Happiness Studies</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="stage" aria-live="polite">
    <section class="quote-card" id="quoteCard">
      <p class="eyebrow">Thought the Day</p>
      <h1 id="quoteText"></h1>
      <p class="summary" id="summaryText"></p>
      <p class="source" id="sourceText"></p>
      <div class="controls">
        <button id="prevBtn" aria-label="Previous quote">PREV</button>
        <button id="randomBtn" aria-label="Random quote">RANDOM</button>
        <button id="nextBtn" aria-label="Next quote">NEXT</button>
      </div>
    </section>
  </main>
  <script src="quotes.js"></script>
  <script src="script.js"></script>
</body>
</html>
